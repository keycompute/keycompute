# KeyCompute 配置文件示例
# 复制此文件为 config.toml 并根据需要修改
# 环境变量优先级高于配置文件，格式：KC__SECTION__KEY=value

# ==================== 应用公开地址配置（全局） ====================
# 用于密码重置邮件、邀请注册链接等中的公开链接
# 除此之外，该值也可通过环境变量 APP_BASE_URL 覆盖（优先级最高）
# 启用邮件服务或需要生成公开邀请链接时必须显式配置
# app_base_url = "https://app.example.com"

# ==================== 服务器配置 ====================
[server]
# 服务器绑定地址
bind_addr = "0.0.0.0"
# 服务器监听端口
port = 3000
# 工作线程数（可选，默认使用 CPU 核心数）
# workers = 4

# ==================== 数据库配置 ====================
[database]
# PostgreSQL 连接 URL
url = "postgres://localhost/keycompute"
# 最大连接数
max_connections = 10
# 最小连接数
min_connections = 2
# 连接超时时间（秒）
connect_timeout_secs = 30
# 连接空闲超时时间（秒）
idle_timeout_secs = 600
# 连接最大生命周期（秒）
max_lifetime_secs = 1800

# ==================== Redis 配置（可选）====================
[redis]
# Redis 连接 URL
url = "redis://127.0.0.1:6379"
# 键前缀（用于多租户隔离）
# key_prefix = "kc:prod:"
# 连接池大小
pool_size = 10
# 连接超时（秒）
connect_timeout_secs = 5

# ==================== 认证配置 ====================
[auth]
# JWT 密钥（生产环境必须修改！）
jwt_secret = "change-me-in-production"
# JWT 签发者
jwt_issuer = "keycompute"
# JWT 过期时间（秒）
jwt_expiry_secs = 3600

# ==================== Gateway 配置 ====================
[gateway]
# 最大重试次数
max_retries = 3
# 请求超时时间（秒）
timeout_secs = 120
# 是否启用 fallback
enable_fallback = true
# HTTP 请求超时（秒）
request_timeout_secs = 120
# 流式请求超时（秒）
stream_timeout_secs = 600

[gateway.retry]
# 初始退避时间（毫秒）
initial_backoff_ms = 100
# 最大退避时间（毫秒）
max_backoff_ms = 10000
# 退避倍数
backoff_multiplier = 2.0

# Gateway HTTP 代理配置（可选）
# 用于多代理出口、按 Provider 路由到不同代理
# [gateway.proxy]

# ==================== 加密配置（可选）====================
# 用于上游 Provider API Key 的加密存储
# 生产环境强烈建议配置！
# 
# [crypto]
# 加密密钥（Base64 编码的 32 字节密钥）
# 生成方式：openssl rand -base64 32
# 或在代码中：keycompute_runtime::ApiKeyCrypto::generate_key()
#
# 环境变量方式（推荐）：KC__CRYPTO__SECRET_KEY
#
# secret_key = "your-base64-encoded-32-byte-key"

# ==================== 邮件服务配置 ====================
# 用于发送注册验证码、密码重置和欢迎邮件
# 启用邮件能力时请完整配置
#
[email]
# SMTP 服务器地址
smtp_host = "smtp.example.com"
# SMTP 端口（默认 465）
smtp_port = 465
# SMTP 用户名
smtp_username = "noreply@example.com"
# SMTP 密码
smtp_password = "your-smtp-password"
# 发件人邮箱地址
from_address = "noreply@example.com"
# 发件人显示名称（可选）
from_name = "KeyCompute"
# 是否使用 TLS（默认 true）
use_tls = true
# 邮件发送超时（秒，默认 30）
timeout_secs = 30

# ==================== 分销配置（可选） ====================
# 提供二级分销的默认比例配置
# 注意：这里只配置默认分销比例，不配置分销开关。
# 分销功能是否开启由 system 角色在后台系统设置中统一管理。
# 一级分销比例范围：0 - 1.0（推荐 0.03 即 3%）
# 二级分销比例范围：0 - 1.0（推荐 0.02 即 2%）
# 注：max_total_ratio 为一级和二级分销的最大总和限制
#
[distribution]
# 一级分销默认比例（如 0.03 表示 3%）
default_level1_ratio = 0.03
# 二级分销默认比例（如 0.02 表示 2%）
default_level2_ratio = 0.02
# 最大总分销比例限制（如 0.30 表示最多 30%）
max_total_ratio = 0.30
#
# 环境变量方式：
# KC__DISTRIBUTION__DEFAULT_LEVEL1_RATIO=0.03
# KC__DISTRIBUTION__DEFAULT_LEVEL2_RATIO=0.02
# KC__DISTRIBUTION__MAX_TOTAL_RATIO=0.30

# ==================== 节点网关配置（Node Gateway） ====================
# 用于个人 PC 节点接入，支持 Ollama 本地模型执行
# 节点通过 node-token 客户端连接，主动轮询任务并提交结果
#
[node_gateway]
# 节点注册 token（生产环境必须修改！）
# 用于验证节点注册请求，所有节点共享此 token
# 生成命令：openssl rand -base64 32
# 安全警告：一旦有节点注册后不可更改（会导致已注册节点失效）
# openssl rand -base64 32
registration_token = "change-me-in-production"
# 会话 TTL（秒），节点会话有效期，默认 300（5 分钟）
# 超过此时间未心跳的会话将被标记为过期
session_ttl_secs = 300
# 心跳间隔（秒），node-token 客户端发送心跳的间隔，默认 30
heartbeat_interval_secs = 30
# 轮询超时（秒），节点长轮询领取任务的最长等待时间，默认 30
poll_timeout_secs = 30
# 任务 deadline 超时（秒），任务必须在 deadline 内完成，默认 120（2 分钟）
task_deadline_secs = 120
# 完成宽限期（秒），任务过期后允许提交结果的时间，默认 60（1 分钟）
complete_grace_secs = 60
# 节点失败阈值，节点连续失败次数达到此值后被排除（excluded），默认 3
node_failure_threshold = 3
# 任务失败阈值，单个任务失败重试次数上限，默认 3
task_failure_threshold = 3
# Sweeper 心跳 TTL（秒），超过此时间未心跳的 online 节点标记为 offline，默认 600（10 分钟）
sweeper_heartbeat_ttl_secs = 600
# Sweeper 补推间隔（秒），创建超过此时间的 queued 任务补推到 Redis，默认 10
sweeper_repush_interval_secs = 10
#
# 环境变量方式（推荐，优先级更高）：
# KC__NODE_GATEWAY__REGISTRATION_TOKEN=change-me-in-production
# KC__NODE_GATEWAY__SESSION_TTL_SECS=300
# KC__NODE_GATEWAY__HEARTBEAT_INTERVAL_SECS=30
# KC__NODE_GATEWAY__POLL_TIMEOUT_SECS=30
# KC__NODE_GATEWAY__TASK_DEADLINE_SECS=120
# KC__NODE_GATEWAY__COMPLETE_GRACE_SECS=60
# KC__NODE_GATEWAY__NODE_FAILURE_THRESHOLD=3
# KC__NODE_GATEWAY__TASK_FAILURE_THRESHOLD=3
# KC__NODE_GATEWAY__SWEEPER_HEARTBEAT_TTL_SECS=600
# KC__NODE_GATEWAY__SWEEPER_REPUSH_INTERVAL_SECS=10

# ==================== 默认系统管理员（环境变量配置） ====================
# 首次启动时自动创建的系统管理员账号
# 注意：这些值不在 config.toml 中配置，而是通过环境变量设置
# 生产环境部署后请立即修改默认密码！
#
# 环境变量：
# KC__DEFAULT_ADMIN_EMAIL=admin@keycompute.local
# KC__DEFAULT_ADMIN_PASSWORD=change-me-admin-password
#
# 对应的 docker-compose.yml 中的设置：
# KC__DEFAULT_ADMIN_EMAIL: ${KC__DEFAULT_ADMIN_EMAIL:-admin@keycompute.local}
# KC__DEFAULT_ADMIN_PASSWORD: ${KC__DEFAULT_ADMIN_PASSWORD:-12345}
