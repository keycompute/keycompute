[package]
name = "client-api"
version = "0.1.0"
edition = "2024"

[dependencies]
# HTTP 客户端（支持 WASM 目标）
reqwest = { version = "0.12", features = ["json"] }

# 序列化
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# 时间处理
chrono = { version = "0.4", features = ["serde"] }

# UUID
uuid = { version = "1", features = ["v4", "serde"] }

# 错误处理
thiserror = "2"

[dev-dependencies]
# 仅用于 native 集成测试
tokio = { version = "1", features = ["full"] }
tokio-test = "0.4"
wiremock = "0.6"
